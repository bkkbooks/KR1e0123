body:
  text: 春秋地名隱八年春宋公衛侯遇于垂傳曰宋公以幣請於衛請先相見衛侯許之遇于垂犬丘也十一年夏公會鄭伯于時來傳曰夏公會鄭伯于時來謀伐許也宣七年冬公會晉侯宋公衛侯鄭伯曹伯于黑壤傳曰盟于黃父公不與盟以賂免故黑壤之盟不書諱之也昭九年春許遷于夷傳曰二月庚申楚公子棄疾遷許于夷實城父也十八年許遷于白羽傳曰楚子使王子勝遷許于析實白羽定十一年夏公會齊侯于夾谷傳曰夏公會齊侯于祝其實夾谷也十二年春齊侯衛侯次于垂葭傳曰春齊侯衛侯次于垂葭實郥氏地有二名七十九錯綜其七釋例曰天有列宿之號地有山川之名尚矣與人倫並今其遺文禹貢及山海經載其大略而春秋經國邑之名又詳然書契以來歷代七百餘年數千其名號處所因緣改變加以四方之語音聲有楚夏文字有異同或一地二名或二地一名或他國之人錯得他國田邑縣以為己屬既難綜練且多繆誤疑闕自禹貢之經猶與輿地實相錯豈況傳記雜書而可必據異同端跡似是而非似非而是者甚眾非精敏兼通不能奄濟其始終以獨見於千載之表也六合之內山川國邑道涂關津春秋多見其事盟會侵伐各有所趣周旋迂直可得而推日月遠近可得而校然詳而究之非書無以志古非圖無以志形坐於堂宇之內瞻天下之廣居究古今之委曲可以行可以言可以鑑可以觀多識山川分野之別賢愚成敗得失之跡雖千載之外若指諸掌圖書之謂也以據今天下郡國縣邑之名山川涂道之實爰及四表自人迹所逮舟車所通皆圖而備之然後以春秋諸國邑盟會地名各所在附列之名曰古今書春秋盟會圖別集疏一卷附之釋例博而備矣春秋地名之變易經傳有起發者有經書所改之名則傳以實明之許遷于夷實城父齊侯衛侯次于垂葭實郥氏之比是也經書未改之名傳發所改為文而稱經以為實者許遷于析實白羽公會齊侯于祝其實夾谷之比是也皆謂所在之地舊名絕於當時而史記有遺文者也若二名當時並存則直兩文互見黑壤犬丘時來之屬是也此皆經傳起事之常猶卿大夫名氏互見非例也傳曰閨門之外實薰隧者薰隧之地在門外非地名也其明年子產數子析之罪稱薰隧之盟是以丘明就於盟文並見薰隧參傳微旨惜多此學者推以求之其庶幾矣疆塲之邑一彼一此所屬無常如陳之焦夷後為楚邑莒魯之鄆亦無一定故今地名唯以先者為主其變改移易學者可尋而知世人以河東汾陰為齊桓所盟葵丘又謂犨縣魚山陂為楚子所次楚師分涉於彭為豫章之彭澤矣吳人入棘櫟為河南之陽翟末學之徒各㸦所見若此者甚多古人之教戒以闕疑苟不廣見乃亦不知所疑也今所記注雖事跡相切名號相附而未有顯證者皆稱今有並以示疑其絕無形類者則闕以待多聞之士焉今所畫圖本依官司空圖司空圖據泰始之初郡國為正時孫氏僭號於吳故江表所記特示略咸寧六年吳乃平定孫氏居八郡之地隨其宜增廣今江表凡十四郡皆貢圖籍新國始通文記所載猶未詳備若足以審其大略自荊揚徐江內郡縣人以各還其舊城故此三州未界大江之表皆改從今為正不復依用司空圖也所載博備則圖體廣大非儒學世家恐不能有之故復別為小圖指舉春秋國邑盟會以參所在郡縣簞食荷儋之學約之通焉地名大凡一千二百一十三其五百六十闕其百七十周及大小國附庸其三十一闕八百九十九地名其四百八十一闕四十一四夷其二十一闕四十一山其十闕五十八水其十三闕魯地隱元年魯魯國魯縣蔑姑蔑二名魯國卞縣有姑蔑城郎高平方與縣東南有郁郎亭二年潛闕唐堂二名高平方與縣北有武唐亭魯侯觀魚臺唐即堂本宋地也七年中丘琅琊臨沂縣東北中丘亭八年許田近許之田九年防琅琊華縣東南防地十年鄧闕十一年菟裘泰山梁甫縣南菟裘之城社圃闕桓三年讙濟北蛇丘縣西有下讙亭五年祝丘闕六年成太山鉅平縣東南成地七年咸丘高平鉅野縣南有咸亭十一年闞東平須昌縣東有闞城十二年曲池魯國汶陽縣北有曲水亭十六年向闕十七年趡闕奚闕莊九年蔇琅琊鄫縣北有蔇亭生竇闕十年長勺闕乘丘闕十一年鄑闕二十七年洮闕二十八年郿闕二十九年諸城陽諸縣也三十一年薛闕秦東平范縣西北有秦亭三十二年逵泉闕閔二年密琅琊費縣北有密如亭夷闕僖元年酈闕汶陽之田棘二名汶水北地也濟北虵邱縣北棘亭又云兗州龔鄉縣東北七十五里有棘鄉費琅琊縣也七年甯母高平方與縣東有泥母亭音如甯十七年卞魯國卞縣二十二年升陘闕二十九年昌衍魯國縣東南有昌平城三十一年濟西田濟水西田重館高平方與縣西北有重鄉城文七年郚五梧二名魯卞縣南有郚鄉城十一年鹹闕十二年鄆田二名此東鄆莒魯所爭者城陽姑幕縣南有員亭或曰鄆即員也疑勾鼆闕戾丘闕宣八年平陽此東平陽也泰山有平陽縣十八年笙魯地也闕或曰境外疑也成二年蜀泰山博縣西北有蜀亭龍泰山博縣西南巢丘闕陽橋闕九年中城東海廩丘縣西南中鄉城十六年壞隤闕鄆此西鄆昭公所出居東郡廩丘縣東有鄆城又云今鄆州鄆城縣是魯西鄆也十八年鹿囿闕襄四年蒲圃場名闕十年鄹魯國魯縣東南莝城也十一年五父之衢魯國魯縣東南十二年台琅琊費縣南有台亭十五年劉闕遇闕十六年海陘闕十七年桃魯國卞縣有東南桃虛陽關泰山鉅平縣東陽關城旅松闕十九年武城泰山南城縣有澹臺子羽冢也二十二年御闕二十六年高魚東郡廩丘縣東北高魚城三十一年陽州闕昭四年庚宗闕丘蕕闕五年蚡泉闕塞關闕八年紅沛國蕭縣西紅亭迂遠疑商衛泰山奉高縣西北有衛亭或曰魯衛西界商宋疑十一年比蒲闕泉丘闕二十二年昌間闕二十六年郈東平無鹽縣東南郈鄉亭炊鼻闕二十七年且知闕定五年東野闕十年龜陰之田泰山博縣北有龜山田在其北十三年虵淵囿闕十四年莒父闕霄闕哀三年啟陽琅琊開陽縣五年毗闕六年邾瑕任城亢父縣北有邾瑕城七年鄫鄫衍二名琅琊繒縣負瑕高平南平陽縣西北有瑕丘城八年闡東平剛平縣西北闡鄉城東陽或曰泰山南城縣西東安城是也疑蠶室闕十一年稷曲闕十四年大野高平鉅野縣東北太澤丘輿泰山南城縣西北有輿城亭十五年輸闕十七年蒙東莞蒙陽縣西故蒙陽城二十七年平陽西北平陽也高平有南平陽縣陵阪闕周地隱元年周雒邑王城郟鄏陌五名河南縣西有郟鄏陌也三年溫蘇二名河內溫縣成周河南洛陽縣六年周扶風雍縣東北周也八年瓦屋闕十一年原河南沁水縣西北原城絺河內野王縣西南絺城樊陽樊二名河內野王縣西南有陽城隰隰郕二名河內懷縣西南有隰城欑茅汲郡修武縣北有欑城向河內軹縣西有地名向上盟孟津二名河內陽城縣南孟津州河內州縣陘闕隤汲郡修武縣北有隤城懷河內懷縣莊元年單闕十六年夷闕二十一年酒泉闕僖二十四年邵扶風雍縣東南有邵亭甘河南縣西南有甘水坎欿河南鞏縣東地名坎埳也二十九年翟泉河南洛陽新城縣北太倉西南池文十八年邥垂河南新城縣北有垂亭成十一年鄄闕鄇田今河內懷縣西南有侯人亭十三年成闕襄二十一年轘轅河內緱氏縣東南有轘轅關三十年平畤闕昭元年京周京周永安縣西有鎬京邑四年景亳河南鞏縣西南有陽亭或言亳即偃師也岐陽岐山之南豐宮始平鄠縣東有靈邑臺九年閻田闕潁闕十三年郊闕十七年甘鹿闕二十二年皇河內鞏縣南有黃亭榮錡氏河南鞏縣西有榮錡澗要闕餞闕揚闕領闕京京楚二名闕也圃車闕前城闕東圉河南洛陽縣東南有圉鄉社闕陰闕侯氏闕谿泉河南鞏縣西南有明谿泉氾闕解河南洛陽縣西南有大解小解任人闕二十三年鄩河南鞏縣西南有地名鄩中也平陰河南河陰縣也澤邑闕訾東訾二名河南鞏縣西南訾城也廧人闕直人闕阪道闕尹道尹闕唐或曰河南洛陽縣東南有唐亭疑西闈闕左巷近東城蒯河南縣西有蒯鄉二十四年瑕闕杏闕二十六年尸氏尸二名河南鞏縣西南偃師城施谷闕渠闕褚氏河南洛陽縣南有褚氏亭萑谷闕闕塞闕外二名河南洛陽縣西南伊闕鞏河南鞏縣莒闕圉澤闕隄上闕攜闕二十九年鄻闕彘平陽永安縣東北彘魯陽南陽魯陽縣也定六年馮闕負黍河南陽城縣西南有負黍亭狐人闕姑蕕闕七年儀栗闕窮谷闕八年穀城河南縣有西穀城簡城闕盂闕哀四年梁河南有梁縣也霍河南梁縣南有霍陽聚邾地隱元年邾魯國鄒縣翼闕僖元年偃闕虛丘闕三十三年芘蔞闕文十三年繹魯國鄒縣北有繹山襄四年狐駘駘上二名魯國番縣東南有目台之亭二十一年漆高平南平陽縣東北有漆鄉閭丘高平南平陽縣西北有顯閭亭昭十九年蟲闕二十三年離姑闕三十一年濫東海昌慮縣所治濫鄉城哀二年漷東田漷水東地沂西田沂水田也絞闕七年茅高平縣西南茅鄉亭鄭地隱元年鄭滎陽宛陵縣西南有新鄭城鄢鄢陵二名潁州鄢陵縣制虢二名滎陽故虢國京滎陽京縣也廩延延二名陳留酸棗縣北有延津城穎闕潁谷闕五年長葛潁州長社縣北有長葛城北制虎牢二名河南成皋縣八年祊琅琊國東南有祊城十一年時來郲二名滎陽縣東有釐城鄔河南緱氏縣西南有鄔聚劉河南緱氏縣西北有劉亭蒍闕邘闕狐壤闕桓五年繻葛闕十一年祭陳留長垣縣東北有祭城十二年武父陳留濟陽縣東北有武父城十四年東郊闕牛首闕十五年櫟河南陽翟縣莊三年滑陳留襄邑縣西北有滑亭十四年大陵闕二十一年弭闕二十三年扈滎陽卷縣西北有扈亭二十八年桐丘穎川許昌縣東北有章丘亭閔二年清滎陽中牟縣西有清陽亭僖六年新城新密二名滎陽密縣二十二年柯澤闕二十四年汜此南汜也周王出居汜楚伐鄭師于汜襄城縣南汜城是也二十八年踐土闕衡雍滎陽卷縣所治垣雍城也三十年函陵闕汜此東汜也秦軍汜南晉伐鄭師于汜滎陽中牟縣南有汜澤三十三年原圃二名滎陽中牟縣有圃田澤鄫城滎陽密縣東北有鄶城故鄶坎文元年緜訾闕匡潁川新汲縣東北匡城二年垂隴滎陽縣東有垂隴城八年暴暴隧二名闕九年狼淵潁川潁陰縣西南有狼陂十三年棐闕十七年儵闕宣元年棐林滎陽宛陵縣東南有林亭北林滎陽中牟縣西有林亭在鄭北三年南里闕郔闕厲闕九年柳棼闕十二年邲闕又云今鄭州管城縣東有古邲城也管滎陽京縣東北管城古管國也熒澤滎陽縣東熒澤成三年伯牛闕又云陳州雍丘縣北有伯牛城鄤闕丘輿闕四年汜祭河南皋城縣東有汜水五年蟲牢陳留封丘縣北有桐牢亭六年繞角闕又云汝州魯山縣南有繞角臺一名涉城十年脩澤滎陽卷縣東有脩武亭十三年訾闕十六年鳴鴈陳留雍丘縣西南有鳴鴈亭督陽闕制田滎陽宛陽縣東有制澤十七年柯陵闕高氏河南陽翟縣西南有高氏亭戲童闕曲洧潁川新汲縣所治曲洧城襄元年鄶陳留襄邑縣東南有鄶城五年城棣陳留酸棗縣西南有棣城七年鄵闕九年戲闕陰阪闕十年梧闕陽陵闕傳曰諸侯之師還鄭而至于陽陵晉與楚夾潁而軍此則陽陵在潁北也或以為襄城武陽縣者非十一年亳城北闕蕭魚闕向潁川長社縣東北向鄉瑣滎陽宛陵縣西北有瑣候亭濟隧闕十六年湛阪襄城昆陽縣北有湛水東入汝十八年汾襄城襄城縣北有汾丘城魚陵南陽犨縣北魚齒山上棗闕胥靡闕獻于闕雍梁河南陽翟縣北有雍氏城二十四年棘澤闕二十六年城麇闕樂氏闕二十八年黃崖黃水之崖三