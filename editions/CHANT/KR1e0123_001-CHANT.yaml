因以為名然則古堂阜也十三年柯濟北有東阿縣杏北杏二名闕閔元年落姑闕僖三年陽穀東平須昌縣北陽穀四年穆陵闕無棣闕十八年甗闕二十六年酅濟北穀城西北有地名酅下文十一年周首濟北穀城縣東北有周首亭十六年郪丘闕十八年申池或曰齊城南面西頭第一門名申門齊城無池唯此門左右有池疑宣元年平州泰山牟縣西平州鄉八年垂闕成二年鞍闕袁婁闕莘闕又云博州武水縣西北有故莘城也華泉闕又云不注山下有此泉濟州歷城縣有華不注山徐關闕又云齊州章縣有故徐關石窌濟北盧縣東有地名石窌丘輿闕馬陘闕十七年清陽平樂平縣也襄二年東陽闕三年耏外闕十八年平陰濟北盧縣東北平陰城防門平陰城南有北坊有門京茲平陰城東南邿平陰城西有邿山郵棠闕十九年祝阿督揚二名濟南祝阿縣也勾竇之丘闕高唐濟南祝阿縣西北高唐城灑藍闕二十五年重丘闕棠闕弇中或曰泰山萊蕪縣西有甕口谷疑二十六年廩丘東郡廩丘縣故城是二十七年崔樂安東朝陽縣西北有崔氏城二十八年邶殿闕昭三年莒闕五年寧風闕十年稷闕棘齊國西安縣東南戟里亭夫于濟南於陵縣西北有于亭十一年渠丘齊國西安縣二十年聊攝平原有聊城縣縣之東北有攝城沛闕二十五年野井濟南祝阿縣東有野井亭定九年媚闕十年夾谷祝其二名闕哀六年賴或曰濟南莒縣南有屬亭疑駘闕殳冐淳闕八年潞闕十年息闕犂丘隰二名濟南有隰陰縣轅濟南祝阿縣西北有轅城十一年艾陵闕清濟北盧縣東有清亭博太山博縣十四年舒州闕豐丘闕郭關闕二十一年顧闕舟道闕二十七年留舒闕陳地隱三年陳陳國陳縣僖二十三年焦譙國譙縣夷父城父二名譙國城父縣文九年壼丘闕宣十一年辰陵潁川長平縣東南有辰亭成十六年鳴鹿陳國武平縣西南有鹿邑亭哀六年大冥闕𣏌地隱四年𣏌緣陵二名國都于緣陵陳留寧陵縣城中有禹祠也牟婁城陽諸縣東北有婁鄉又云北海郡淳于縣蔡地隱四年蔡汝南上蔡縣桓二年鄧潁川召陵縣西南有鄧城十年莘闕成六年桑隧汝南朗陵縣東北有桑里亭昭十九年郥陽闕邢地隱五年邢廣平襄國縣閔二年夷儀闕僖元年聶北闕成地隱五年郕東平剛平縣西南有成鄉桓十一年夫鍾闕文十二年成圭或曰邑或曰玉闕晉地隱六年晉大鹵太原大夏參虛晉陽六名太原晉陽縣五年曲沃新城下國三名河東聞喜縣翼平陽絳邑縣東有翼城隨闕六年鄂闕桓二年條闕千畝西河介休縣南地名千畝陘庭闕三年汾隰闕莊二十五年聚闕二十六年絳故絳二名平陽絳邑縣西絳邑城二十八年東關闕蒲蒲城二名平陽蒲子縣屈二屈二名平陽北屈縣僖八年采桑平陽北屈縣西南有采桑津也九年高梁高梁之虛二名平陽楊氏縣西南高梁城十年韓韓原宗丘三名故韓國縣十五年河外列城五河之南也焦瑕其二城其三闕東盡虢略從河西南行而東盡故虢略地解梁城河東解縣陰闕十六年狐廚平陽臨汾縣西北有狐谷亭受鐸闕昆都闕二十四年令狐闕桑泉河東解縣西桑泉城臼衰河東解縣東南有臼城廬柳闕郇郇瑕氏二名古國名屏闕樓闕緜上緜二名西河介休縣南有地名緜上二十五年南陽晉所始開河內汲郡地二十七年被廬闕二十八年河陽河內有河陽縣南河汲郡河南渡而東三十年焦瑕闕三十一年清清原二名河東聞喜縣北有清原也三十三年箕太原陽邑縣南有箕城先茅之縣茅二名河東大陽縣西有茅津茅亭文三年王官闕郊闕五年甯汲郡修武縣六年夷闕董河東汾陰縣有董亭郫郫邵二名闕七年堇陰闕傳曰先克奪蒯得田于堇陰八年武城闕十年北徵闕十二年河曲河東蒲坂縣南羈馬闕瑕河東猗氏縣東北有瑕城十三年桃林之塞弘農華陰縣東潼關諸浮闕十七年黃父黑壤二名闕宣二年陰地晉之河南山北自上洛以東至陸渾六年邢丘河內平皋縣七年向陰闕十二年董澤河東聞喜縣東北有董池陂十五年曲梁廣平曲梁縣也輔氏闕稷河東聞喜縣西有稷山亭雒闕瓜衍之縣闕十七年斷道卷楚二名闕野王河內野王縣范闕成元年赤棘闕六年盬河東猗氏縣鹽池新田絳二名平陽絳邑縣也九年銅鞮上黨銅鞮縣也十三年河縣闕箕郜闕十六年苕丘闕十七年虛闕襄元年瓠丘河東東垣縣東南有壼丘亭三年長樗闕鷄澤廣平曲梁縣西南十年著雍闕傳曰晉侯還及此而疾則著雍在河之南也或曰宋地非十一年櫟河東北間十八年長子上黨屯留縣純留上黨屯留縣梗陽在太原晉陽縣南陽城二十一年著闕祁太原祁縣二十三年雍榆汲郡朝歌縣東有雍榆城朝歌汲郡朝歌縣孟門闕熒庭闕東陽晉之山東魏郡廣平以北二十六年鄐鄐田二名闕邢闕苗河內軹縣南有苗亭二十七年木門闕或曰魏邑也子鮮奔晉託于木門三十年任廣平任縣昭二年中都西河介休縣東南中都城五年楊楊氏二名平陽楊縣故楊國也八年魏榆闕虒祁平陽絳邑縣西南汾水上也九年戲陽魏郡內黃縣北有戲陽城十七年棘津闕二十八年乾侯魏郡斥丘縣鄔太原鄔縣平陵闕塗水太原榆次縣馬首闕盂太原盂縣平陽平陽縣三十一年適歷闕定元年大陸汲郡修武縣西北吳澤三年平中闕九年五氏寒氏二名闕中牟熒陽有中牟縣廻遠疑十三年河內河內汲縣邯鄲廣平邯鄲縣十四年百泉闕哀元年棘蒲闕四年上雒倉野並在上雒縣也少習上雒商縣武關臨闕欒趙郡平棘縣西北有欒城鄗趙國鄗邑縣逆畤闕陰人闕壼口路縣東有壼口關柏人趙郡柏人縣十五年冠氏平陽館陶縣二十二年英丘闕薛地隱十一年薛魯國薛縣定元年邳下邳縣故邳國許地隱十一年許穎川許昌縣成四年展陂闕鉏任冷敦之田闕十四年叔申之封闕襄十六